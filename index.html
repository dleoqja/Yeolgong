<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>열공머신</title>
  <meta name="description" content="개인용 공부 시간 관리 앱 — 열공머신" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#101116" />

  <!-- iOS 홈 화면 설치 지원 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="열공머신" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <style>
/* ===== 열공머신 — Focus Console (1-screen / no-scroll) ===== */
:root{
  --ink:#101116;
  --panel:#181A20;
  --panel-2:#20232C;
  --line:#2A2E38;
  --text:#ECEEF3;
  --muted:#878D9B;
  --muted-2:#5D636F;
  --accent:#C7F051;
  --accent-dim:#3a4a1f;
  --tomato:#FF6B5B;
  --tomato-dim:#52251f;
  --good:#7BE0A6;
  --radius:20px;
  --radius-sm:14px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --mono:ui-monospace,"SF Mono","SFMono-Regular","Roboto Mono","DejaVu Sans Mono",Menlo,Consolas,monospace;
  --sans:system-ui,-apple-system,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",Roboto,sans-serif;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  background:var(--ink);
  color:var(--text);
  font-family:var(--sans);
  overflow:hidden;                 /* 페이지 스크롤 제거 */
  overscroll-behavior:none;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none;}
.hidden{display:none !important;}

.app{
  max-width:520px;
  margin:0 auto;
  height:100vh;
  height:100dvh;                   /* 모바일 동적 뷰포트 */
  display:flex;
  flex-direction:column;
  overflow:hidden;
  position:relative;
}

/* ===== 히어로 (컴팩트) ===== */
.hero{
  flex:0 0 auto;
  padding:calc(var(--safe-top) + 8px) 18px 10px;
  background:
    radial-gradient(120% 90% at 50% -20%, rgba(199,240,81,.10), transparent 60%),
    var(--ink);
  border-bottom:1px solid var(--line);
}
.hero-top{display:flex;align-items:center;justify-content:space-between;}
.brand{display:flex;align-items:center;gap:8px;}
.brand-mark{
  width:26px;height:26px;display:grid;place-items:center;
  background:var(--accent);color:#11140a;border-radius:8px;font-weight:800;font-size:14px;
}
.brand-name{font-weight:700;font-size:15px;letter-spacing:.2px;}
.streak{
  display:flex;align-items:center;gap:4px;
  background:var(--panel-2);border:1px solid var(--line);
  padding:5px 10px;border-radius:999px;font-size:12.5px;
}
.streak-num{font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums;}
.streak-unit{color:var(--muted);}

.hero-clock{text-align:center;padding-top:6px;}
.hero-label{margin:0 0 2px;color:var(--muted);font-size:12.5px;letter-spacing:.4px;}
.bigtime{
  font-family:var(--mono);
  font-size:clamp(30px,6vh,46px);
  font-weight:600;letter-spacing:1px;line-height:1;
  font-variant-numeric:tabular-nums;color:var(--text);
  text-shadow:0 0 22px rgba(199,240,81,.12);
}
.bigtime.running{color:var(--accent);text-shadow:0 0 26px rgba(199,240,81,.26);}

.goal-row{display:block;width:100%;margin:8px auto 0;max-width:340px;text-align:left;}
.goal-bar{height:7px;border-radius:99px;background:var(--panel-2);overflow:hidden;}
.goal-fill{height:100%;width:0%;border-radius:99px;background:linear-gradient(90deg,var(--accent),#9fd62e);transition:width .5s ease;}
.goal-meta{display:flex;justify-content:space-between;margin-top:5px;font-size:12px;color:var(--muted);}
.goal-pct{color:var(--accent);font-weight:700;font-variant-numeric:tabular-nums;}

/* ===== 콘텐츠 (남는 높이 전부 차지, 내부 스크롤 없음) ===== */
.content{flex:1 1 auto;min-height:0;overflow:hidden;padding:12px 16px;display:flex;}
.panel{
  flex:1;min-height:0;width:100%;
  display:flex;flex-direction:column;gap:10px;
  animation:fade .25s ease;
}
@keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

/* ---- 공부 탭 ---- */
.study-stage{
  flex:1;min-height:0;
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
}
.study-elapsed{
  font-family:var(--mono);font-size:clamp(30px,5.5vh,44px);font-weight:600;
  font-variant-numeric:tabular-nums;letter-spacing:1px;color:var(--muted-2);
}
.study-elapsed.live{color:var(--accent);}
.study-elapsed.paused{color:var(--tomato);}
.study-state{margin:8px 0 0;color:var(--muted);font-size:13px;}

.study-controls{display:flex;gap:10px;flex:0 0 auto;}
.pomo-controls{display:flex;gap:10px;flex:0 0 auto;}

.btn{
  border-radius:15px;font-weight:700;font-size:15.5px;
  padding:15px 16px;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:transform .08s ease,opacity .2s ease,background .2s ease;border:1px solid transparent;
}
.btn:active{transform:scale(.97);}
.btn.primary{background:var(--accent);color:#11140a;}
.btn.tomato{background:var(--tomato);color:#fff;}
.btn.ghost{background:var(--panel-2);border-color:var(--line);color:var(--text);}
.btn.danger{background:transparent;border-color:var(--tomato);color:var(--tomato);}
.btn.wide{width:100%;}
.btn.grow{flex:1;}
.btn.big{font-size:17px;padding:16px;border-radius:16px;}

.mini-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;flex:0 0 auto;}
.mini-card{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-sm);
  padding:10px;text-align:center;
}
.mini-num{display:block;font-family:var(--mono);font-size:20px;font-weight:600;font-variant-numeric:tabular-nums;}
.mini-label{display:block;margin-top:2px;font-size:11px;color:var(--muted);}

/* ---- 뽀모도로 탭 ---- */
.dial-wrap{
  position:relative;flex:1;min-height:0;width:100%;
  display:grid;place-items:center;
}
.dial{width:min(58vw,30vh);height:min(58vw,30vh);touch-action:none;display:block;overflow:visible;}
.dial:focus{outline:none;}
.dial:focus-visible .dial-knob{stroke:#fff;stroke-width:3;}
.dial-track{fill:none;stroke:var(--panel-2);stroke-width:18;}
.dial-progress{
  fill:none;stroke:var(--tomato);stroke-width:18;stroke-linecap:round;
  transform:rotate(-90deg);transform-origin:150px 150px;transition:stroke-dashoffset .15s linear;
}
.dial-knob{fill:#fff;stroke:var(--tomato);stroke-width:4;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5));}
.dial-tick{stroke:var(--muted-2);stroke-width:2;}
.dial-tick.major{stroke:var(--muted);stroke-width:3;}
.dial-center{position:absolute;inset:0;display:grid;place-content:center;text-align:center;pointer-events:none;}
.dial-min{font-family:var(--mono);font-size:clamp(30px,6.5vh,48px);font-weight:600;line-height:1;font-variant-numeric:tabular-nums;}
.dial-unit{color:var(--muted);font-size:14px;margin-top:2px;}
.dial-min.counting{color:var(--tomato);}

.presets{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;flex:0 0 auto;}
.preset{
  background:var(--panel-2);border:1px solid var(--line);border-radius:999px;
  padding:8px 14px;font-size:13.5px;font-weight:600;color:var(--muted);
}
.preset.active{background:var(--tomato-dim);border-color:var(--tomato);color:#fff;}

/* ---- 달력 탭 ---- */
.cal-head{display:flex;align-items:center;justify-content:space-between;flex:0 0 auto;}
.cal-title{font-size:17px;font-weight:700;}
.cal-nav{
  width:38px;height:38px;border-radius:11px;background:var(--panel-2);border:1px solid var(--line);
  font-size:20px;color:var(--text);display:grid;place-items:center;
}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;flex:0 0 auto;}
.cal-dow span{text-align:center;font-size:11px;color:var(--muted);padding:2px 0;}
.cal-dow span:first-child{color:#ff8a7a;}
.cal-dow span:last-child{color:#7ab0ff;}

.cal-grid{
  flex:1 1 auto;min-height:0;
  display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:1fr;gap:5px;
}
.cal-cell{
  min-height:0;border-radius:10px;background:var(--panel);border:1px solid var(--line);
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:4px 2px 3px;position:relative;overflow:hidden;
}
.cal-cell.empty{background:transparent;border:none;}
.cal-cell.today{border-color:var(--accent);}
.cal-cell .d{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;line-height:1;}
.cal-cell.today .d{color:var(--accent);font-weight:800;}
.cal-cell .dur{font-family:var(--mono);font-size:9px;font-weight:600;margin-top:auto;color:var(--accent);line-height:1.05;text-align:center;}
.cal-cell .barfill{position:absolute;left:0;right:0;bottom:0;background:rgba(199,240,81,.12);}
.cal-cell.has{cursor:pointer;}

.cal-total{
  display:flex;justify-content:space-between;align-items:center;flex:0 0 auto;
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 16px;
}
.cal-total span{color:var(--muted);font-size:13.5px;}
.cal-total strong{font-family:var(--mono);font-size:17px;color:var(--accent);}

/* ===== 탭바 (흐름 내 고정 — 스크롤 없이 항상 하단) ===== */
.tabbar{
  flex:0 0 auto;
  display:grid;grid-template-columns:repeat(3,1fr);
  background:rgba(20,21,26,.92);backdrop-filter:blur(14px);
  border-top:1px solid var(--line);
  padding:7px 8px calc(7px + var(--safe-bottom));
}
.tab{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 4px;border-radius:12px;color:var(--muted);}
.tab-ic{font-size:19px;line-height:1;filter:grayscale(.4) opacity(.7);}
.tab-tx{font-size:11px;font-weight:600;}
.tab.is-active{color:var(--text);}
.tab.is-active .tab-ic{filter:none;}

/* ===== 모달 / 시트 ===== */
.sheet-backdrop,.done-backdrop{
  position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.55);
  display:flex;align-items:flex-end;justify-content:center;animation:fade .2s ease;
}
.done-backdrop{align-items:center;padding:24px;}
.sheet{
  width:100%;max-width:520px;background:var(--panel);
  border-radius:24px 24px 0 0;border:1px solid var(--line);border-bottom:none;
  padding:10px 20px calc(22px + var(--safe-bottom));
  animation:slideup .28s cubic-bezier(.2,.8,.2,1);
  max-height:82dvh;overflow-y:auto;
}
@keyframes slideup{from{transform:translateY(100%);}to{transform:none;}}
.sheet-grip{width:40px;height:4px;border-radius:99px;background:var(--line);margin:4px auto 14px;}
.sheet-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;}
.sheet-head h2{margin:0;font-size:19px;}
.sheet-total{font-family:var(--mono);color:var(--accent);font-weight:700;}
.sheet-body{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.sess{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--panel-2);border:1px solid var(--line);border-radius:14px;padding:13px 15px;
}
.sess-l{display:flex;align-items:center;gap:11px;}
.sess-ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:16px;background:var(--ink);}
.sess-time{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums;}
.sess-type{font-size:13px;font-weight:700;}
.sess-dur{font-family:var(--mono);font-weight:600;color:var(--accent);font-variant-numeric:tabular-nums;}
.sheet-empty{text-align:center;color:var(--muted);padding:26px 0;font-size:14px;}

.goal-pick{display:flex;align-items:center;justify-content:center;gap:18px;margin:6px 0 18px;}
.step{width:52px;height:52px;border-radius:16px;background:var(--panel-2);border:1px solid var(--line);font-size:26px;color:var(--text);}
.goal-value{display:flex;align-items:baseline;gap:4px;font-family:var(--mono);font-size:34px;font-weight:600;}
.goal-value small{font-family:var(--sans);font-size:14px;color:var(--muted);margin:0 6px 0 1px;}
.goal-quick{display:flex;gap:8px;justify-content:center;margin-bottom:20px;flex-wrap:wrap;}
.goal-quick button{background:var(--panel-2);border:1px solid var(--line);border-radius:999px;padding:9px 15px;font-size:13px;color:var(--muted);font-weight:600;}

.done-card{
  background:var(--panel);border:1px solid var(--line);border-radius:24px;
  padding:34px 26px 26px;text-align:center;max-width:340px;width:100%;
  animation:pop .3s cubic-bezier(.2,1.2,.4,1);
}
@keyframes pop{from{transform:scale(.85);opacity:0;}to{transform:none;opacity:1;}}
.done-emoji{font-size:54px;animation:wob .6s ease;}
@keyframes wob{0%,100%{transform:rotate(0);}25%{transform:rotate(-12deg);}75%{transform:rotate(12deg);}}
.done-title{margin:10px 0 6px;font-size:22px;}
.done-sub{margin:0 0 22px;color:var(--muted);font-size:14px;}

.toast{
  position:fixed;left:50%;bottom:calc(82px + var(--safe-bottom));transform:translateX(-50%);
  z-index:60;background:var(--panel-2);border:1px solid var(--line);
  padding:11px 17px;border-radius:999px;font-size:13.5px;font-weight:600;
  box-shadow:0 8px 24px rgba(0,0,0,.4);animation:fade .2s ease;max-width:90%;
}

/* 화면이 아주 낮을 때(가로 등) 추가 압축 */
@media (max-height:560px){
  .hero-clock{padding-top:4px;}
  .bigtime{font-size:clamp(32px,7vh,46px);}
  .goal-row{margin-top:6px;}
  .mini-stats{display:none;}
}

@media (prefers-reduced-motion: reduce){
  *{animation:none !important;transition:none !important;}
}

</style>
</head>
<body>
  <div class="app">

    <!-- ===== 헤더 + 히어로 (오늘 공부시간) ===== -->
    <header class="hero">
      <div class="hero-top">
        <div class="brand">
          <span class="brand-mark">熱</span>
          <span class="brand-name">열공머신</span>
        </div>
        <button class="streak" id="streakChip" type="button" aria-label="연속 공부일">
          <span class="streak-flame">🔥</span>
          <span class="streak-num" id="streakNum">0</span>
          <span class="streak-unit">일</span>
        </button>
      </div>

      <div class="hero-clock">
        <p class="hero-label">오늘 공부시간</p>
        <div class="bigtime" id="todayTime" aria-live="polite">00:00:00</div>

        <button class="goal-row" id="goalRow" type="button">
          <div class="goal-bar">
            <div class="goal-fill" id="goalFill"></div>
          </div>
          <div class="goal-meta">
            <span id="goalText">목표 0시간 0분</span>
            <span class="goal-pct" id="goalPct">0%</span>
          </div>
        </button>
      </div>
    </header>

    <!-- ===== 탭 콘텐츠 ===== -->
    <main class="content">

      <!-- 1) 공부 -->
      <section class="panel" id="panel-study" data-panel="study">
        <div class="study-stage">
          <div class="study-elapsed" id="studyElapsed">00:00:00</div>
          <p class="study-state" id="studyState">시작 버튼을 눌러 집중을 시작하세요</p>
        </div>

        <div class="study-controls" id="studyControls">
          <!-- 동적으로 채워짐 -->
        </div>

        <div class="mini-stats">
          <div class="mini-card">
            <span class="mini-num" id="todaySessions">0</span>
            <span class="mini-label">오늘 세션</span>
          </div>
          <div class="mini-card">
            <span class="mini-num" id="todayLong">00:00</span>
            <span class="mini-label">최장 집중</span>
          </div>
        </div>
      </section>

      <!-- 2) 뽀모도로 -->
      <section class="panel hidden" id="panel-pomo" data-panel="pomo">
        <div class="dial-wrap">
          <svg id="dial" class="dial" viewBox="0 0 300 300" role="slider"
               aria-label="뽀모도로 시간 설정" aria-valuemin="1" aria-valuemax="60" aria-valuenow="25" tabindex="0">
            <circle class="dial-track" cx="150" cy="150" r="120" />
            <circle class="dial-progress" id="dialProgress" cx="150" cy="150" r="120" />
            <g id="dialTicks"></g>
            <circle class="dial-knob" id="dialKnob" cx="150" cy="30" r="13" />
          </svg>
          <div class="dial-center">
            <div class="dial-min" id="dialMin">25</div>
            <div class="dial-unit" id="dialUnit">분</div>
          </div>
        </div>

        <div class="presets" id="presets">
          <button class="preset" data-min="10" type="button">10분</button>
          <button class="preset" data-min="25" type="button">25분</button>
          <button class="preset" data-min="45" type="button">45분</button>
          <button class="preset" data-min="60" type="button">60분</button>
        </div>

        <div class="pomo-controls" id="pomoControls">
          <!-- 동적으로 채워짐 -->
        </div>
      </section>

      <!-- 3) 달력 -->
      <section class="panel hidden" id="panel-cal" data-panel="cal">
        <div class="cal-head">
          <button class="cal-nav" id="calPrev" type="button" aria-label="이전 달">‹</button>
          <div class="cal-title" id="calTitle">2026년 6월</div>
          <button class="cal-nav" id="calNext" type="button" aria-label="다음 달">›</button>
        </div>

        <div class="cal-dow">
          <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
        </div>
        <div class="cal-grid" id="calGrid"></div>

        <div class="cal-total">
          <span>이번 달 총 공부시간</span>
          <strong id="calMonthTotal">0시간 0분</strong>
        </div>
      </section>

    </main>

    <!-- ===== 하단 탭 바 ===== -->
    <nav class="tabbar">
      <button class="tab is-active" data-tab="study" type="button">
        <span class="tab-ic">⏱</span><span class="tab-tx">공부</span>
      </button>
      <button class="tab" data-tab="pomo" type="button">
        <span class="tab-ic">🍅</span><span class="tab-tx">뽀모도로</span>
      </button>
      <button class="tab" data-tab="cal" type="button">
        <span class="tab-ic">📅</span><span class="tab-tx">달력</span>
      </button>
    </nav>
  </div>

  <!-- ===== 날짜 상세 모달 ===== -->
  <div class="sheet-backdrop hidden" id="dayBackdrop">
    <div class="sheet" id="daySheet" role="dialog" aria-modal="true">
      <div class="sheet-grip"></div>
      <div class="sheet-head">
        <h2 id="dayTitle">날짜</h2>
        <span class="sheet-total" id="dayTotal">0분</span>
      </div>
      <div class="sheet-body" id="dayBody"></div>
      <button class="btn ghost wide" id="dayClose" type="button">닫기</button>
    </div>
  </div>

  <!-- ===== 목표 설정 모달 ===== -->
  <div class="sheet-backdrop hidden" id="goalBackdrop">
    <div class="sheet" role="dialog" aria-modal="true">
      <div class="sheet-grip"></div>
      <div class="sheet-head"><h2>오늘 공부 목표</h2></div>
      <div class="goal-pick">
        <button class="step" id="goalMinus" type="button">−</button>
        <div class="goal-value"><span id="goalPickH">2</span><small>시간</small><span id="goalPickM">00</span><small>분</small></div>
        <button class="step" id="goalPlus" type="button">+</button>
      </div>
      <div class="goal-quick" id="goalQuick">
        <button data-min="60" type="button">1시간</button>
        <button data-min="120" type="button">2시간</button>
        <button data-min="180" type="button">3시간</button>
        <button data-min="300" type="button">5시간</button>
      </div>
      <button class="btn primary wide" id="goalSave" type="button">저장</button>
    </div>
  </div>

  <!-- ===== 뽀모도로 완료 오버레이 ===== -->
  <div class="done-backdrop hidden" id="doneBackdrop">
    <div class="done-card">
      <div class="done-emoji">🍅</div>
      <h2 class="done-title">뽀모도로 완료!</h2>
      <p class="done-sub" id="doneSub">25분이 오늘 공부시간에 더해졌어요</p>
      <button class="btn primary wide" id="doneClose" type="button">확인</button>
    </div>
  </div>

  <!-- 토스트 -->
  <div class="toast hidden" id="toast"></div>

  <script>
/* ===================================================================
   열공머신 — app.js
   데이터: localStorage 'yg_data_v1'
   ⏱ 공부 타이머 · 🍅 뽀모도로 · 📅 달력 · 목표 · 스트릭
   타이머는 "타임스탬프 기반"이라 앱을 닫거나 새로고침해도
   실제 시간이 흐른 만큼 정확히 누적됩니다.
=================================================================== */
(() => {
'use strict';

const KEY = 'yg_data_v1';
const $  = (s) => document.querySelector(s);
const $$ = (s) => Array.from(document.querySelectorAll(s));

/* ---------- 저장소 ---------- */
const defaultData = () => ({
  sessions: [],          // {id,type:'study'|'pomodoro',date:'YYYY-MM-DD',start,end,duration}
  goalMinutes: 120,
  activeStudy: null,     // {firstStart,segStart,accumulated,paused}
  activePomodoro: null   // {firstStart,durationMs,endTarget,paused,remaining}
});

let data;
function load(){
  try{
    const raw = localStorage.getItem(KEY);
    data = raw ? Object.assign(defaultData(), JSON.parse(raw)) : defaultData();
  }catch(e){ data = defaultData(); }
}
let saveTimer = null;
function save(){
  // 빈번한 1초 갱신은 디바운스, 중요한 변화는 즉시 flush
  clearTimeout(saveTimer);
  saveTimer = setTimeout(flush, 400);
}
function flush(){
  clearTimeout(saveTimer);
  try{ localStorage.setItem(KEY, JSON.stringify(data)); }catch(e){}
}

/* ---------- 시간 유틸 ---------- */
const pad = (n) => String(n).padStart(2,'0');
function fmtHMS(ms){
  const t = Math.max(0, Math.floor(ms/1000));
  return `${pad(Math.floor(t/3600))}:${pad(Math.floor(t/60)%60)}:${pad(t%60)}`;
}
function fmtMS(ms){ // mm:ss
  const t = Math.max(0, Math.floor(ms/1000));
  return `${pad(Math.floor(t/60))}:${pad(t%60)}`;
}
function fmtKorDur(ms){
  const m = Math.round(ms/60000);
  const h = Math.floor(m/60), mm = m%60;
  if(h>0 && mm>0) return `${h}시간 ${mm}분`;
  if(h>0) return `${h}시간`;
  return `${mm}분`;
}
function dateKey(d){
  const x = (d instanceof Date) ? d : new Date(d);
  return `${x.getFullYear()}-${pad(x.getMonth()+1)}-${pad(x.getDate())}`;
}
function clockOf(ts){
  const d = new Date(ts);
  let h = d.getHours(); const ap = h<12 ? '오전':'오후';
  h = h%12 || 12;
  return `${ap} ${h}:${pad(d.getMinutes())}`;
}

/* ---------- 집계 ---------- */
function sessionsOn(key){ return data.sessions.filter(s => s.date === key); }
function savedTotalOn(key){ return sessionsOn(key).reduce((a,s)=>a+s.duration,0); }

function liveStudyMs(){
  const a = data.activeStudy; if(!a) return 0;
  if(a.paused) return a.accumulated;
  return a.accumulated + (Date.now() - a.segStart);
}
function todayTotalMs(){
  const k = dateKey(new Date());
  let t = savedTotalOn(k);
  if(data.activeStudy && dateKey(data.activeStudy.firstStart) === k) t += liveStudyMs();
  return t;
}
function computeStreak(){
  const set = new Set(data.sessions.filter(s=>s.duration>0).map(s=>s.date));
  const today = new Date(); today.setHours(0,0,0,0);
  let cur = new Date(today);
  // 오늘 기록이 없으면 어제부터 카운트
  if(!set.has(dateKey(cur)) && (!data.activeStudy)) cur.setDate(cur.getDate()-1);
  let n = 0;
  while(set.has(dateKey(cur)) || (n===0 && data.activeStudy && dateKey(cur)===dateKey(new Date()))){
    n++; cur.setDate(cur.getDate()-1);
  }
  return n;
}

/* =================================================================
   화면 갱신
================================================================= */
function renderHero(){
  $('#todayTime').textContent = fmtHMS(todayTotalMs());
  $('#todayTime').classList.toggle('running', !!(data.activeStudy && !data.activeStudy.paused));

  const goalMs = data.goalMinutes*60000;
  const pct = goalMs>0 ? Math.min(100, (todayTotalMs()/goalMs)*100) : 0;
  $('#goalFill').style.width = pct+'%';
  $('#goalText').textContent = `목표 ${fmtKorDur(goalMs)}`;
  $('#goalPct').textContent = Math.round(pct)+'%';

  $('#streakNum').textContent = computeStreak();
}

/* ---------- 공부 탭 ---------- */
function renderStudy(){
  const a = data.activeStudy;
  const el = $('#studyElapsed');
  const st = $('#studyState');
  const ctr = $('#studyControls');
  el.textContent = fmtHMS(liveStudyMs());
  el.classList.toggle('live', !!(a && !a.paused));
  el.classList.toggle('paused', !!(a && a.paused));

  if(!a){
    st.textContent = '시작 버튼을 눌러 집중을 시작하세요';
    ctr.innerHTML = `<button class="btn primary big wide" id="btnStart">▶  공부 시작</button>`;
    $('#btnStart').onclick = startStudy;
  }else if(a.paused){
    st.textContent = '일시정지됨';
    ctr.innerHTML = `
      <button class="btn primary grow" id="btnResume">▶ 계속</button>
      <button class="btn danger grow" id="btnStop">■ 종료</button>`;
    $('#btnResume').onclick = resumeStudy;
    $('#btnStop').onclick = stopStudy;
  }else{
    st.textContent = '집중 중…';
    ctr.innerHTML = `
      <button class="btn ghost grow" id="btnPause">‖ 일시정지</button>
      <button class="btn danger grow" id="btnStop">■ 종료</button>`;
    $('#btnPause').onclick = pauseStudy;
    $('#btnStop').onclick = stopStudy;
  }

  // 미니 통계
  const todays = sessionsOn(dateKey(new Date()));
  $('#todaySessions').textContent = todays.length;
  const longest = todays.reduce((m,s)=>Math.max(m,s.duration),0);
  $('#todayLong').textContent = fmtMS(longest);
}

function startStudy(){
  unlockAudio();
  const now = Date.now();
  data.activeStudy = { firstStart: now, segStart: now, accumulated: 0, paused: false };
  flush(); requestWakeLock();
  renderStudy(); renderHero();
}
function pauseStudy(){
  const a = data.activeStudy; if(!a||a.paused) return;
  a.accumulated += Date.now() - a.segStart;
  a.paused = true; a.segStart = 0;
  flush(); renderStudy(); renderHero();
}
function resumeStudy(){
  const a = data.activeStudy; if(!a||!a.paused) return;
  a.segStart = Date.now(); a.paused = false;
  flush(); requestWakeLock(); renderStudy(); renderHero();
}
function stopStudy(){
  const a = data.activeStudy; if(!a) return;
  const dur = liveStudyMs();
  const end = Date.now();
  if(dur >= 1000){
    data.sessions.push({
      id: 's'+a.firstStart, type:'study',
      date: dateKey(a.firstStart),
      start: a.firstStart, end, duration: dur
    });
  }
  data.activeStudy = null;
  flush(); releaseWakeLock();
  toast(dur>=1000 ? `+${fmtKorDur(dur)} 기록했어요` : '기록하기엔 너무 짧아요');
  renderStudy(); renderHero(); if(currentTab==='cal') renderCalendar();
}

/* =================================================================
   뽀모도로
================================================================= */
let dialMinutes = 25;
const DIAL_MAX = 60;
const R = 120, CIRC = 2*Math.PI*R;

function buildDialTicks(){
  const g = $('#dialTicks'); g.innerHTML='';
  for(let i=0;i<60;i++){
    const ang = (i/60)*2*Math.PI - Math.PI/2;
    const major = i%5===0;
    const r1 = major?98:104, r2 = 112;
    const x1 = 150+Math.cos(ang)*r1, y1 = 150+Math.sin(ang)*r1;
    const x2 = 150+Math.cos(ang)*r2, y2 = 150+Math.sin(ang)*r2;
    const ln = document.createElementNS('http://www.w3.org/2000/svg','line');
    ln.setAttribute('x1',x1);ln.setAttribute('y1',y1);
    ln.setAttribute('x2',x2);ln.setAttribute('y2',y2);
    ln.setAttribute('class','dial-tick'+(major?' major':''));
    g.appendChild(ln);
  }
  $('#dialProgress').setAttribute('stroke-dasharray', CIRC);
}

function setDialVisual(min, runningFrac){
  // runningFrac: 카운트다운 중이면 남은 비율(0~1), 아니면 null → 설정값 표시
  const frac = (runningFrac!=null) ? runningFrac : (min/DIAL_MAX);
  $('#dialProgress').setAttribute('stroke-dashoffset', CIRC*(1-frac));
  const ang = frac*2*Math.PI - Math.PI/2;
  $('#dialKnob').setAttribute('cx', 150+Math.cos(ang)*R);
  $('#dialKnob').setAttribute('cy', 150+Math.sin(ang)*R);
  $('#dial').setAttribute('aria-valuenow', min);
}

function setDialMinutes(min){
  dialMinutes = Math.min(DIAL_MAX, Math.max(1, Math.round(min)));
  $('#dialMin').textContent = dialMinutes;
  $('#dialUnit').textContent = '분';
  $('#dialMin').classList.remove('counting');
  setDialVisual(dialMinutes, null);
  $$('#presets .preset').forEach(b=>b.classList.toggle('active', +b.dataset.min===dialMinutes));
  const startBtn = $('#btnPomoStart');
  if(startBtn && !data.activePomodoro) startBtn.textContent = `▶  ${dialMinutes}분 시작`;
}

/* 다이얼 드래그 */
function dialPointer(e){
  const svg = $('#dial');
  const rect = svg.getBoundingClientRect();
  const cx = rect.left+rect.width/2, cy = rect.top+rect.height/2;
  const px = (e.touches?e.touches[0].clientX:e.clientX);
  const py = (e.touches?e.touches[0].clientY:e.clientY);
  let deg = Math.atan2(py-cy, px-cx)*180/Math.PI + 90;
  if(deg<0) deg+=360;
  let m = Math.round(deg/6);          // 360/60
  if(m===0) m=DIAL_MAX;
  setDialMinutes(m);
}
function initDial(){
  buildDialTicks();
  setDialMinutes(25);
  const svg = $('#dial');
  let dragging=false;
  const down = (e)=>{ if(data.activePomodoro) return; dragging=true; dialPointer(e); e.preventDefault(); };
  const move = (e)=>{ if(dragging){ dialPointer(e); e.preventDefault(); } };
  const up   = ()=>{ dragging=false; };
  svg.addEventListener('mousedown',down); window.addEventListener('mousemove',move); window.addEventListener('mouseup',up);
  svg.addEventListener('touchstart',down,{passive:false}); window.addEventListener('touchmove',move,{passive:false}); window.addEventListener('touchend',up);
  svg.addEventListener('keydown',(e)=>{
    if(data.activePomodoro) return;
    if(e.key==='ArrowUp'||e.key==='ArrowRight'){ setDialMinutes(dialMinutes+1); e.preventDefault(); }
    if(e.key==='ArrowDown'||e.key==='ArrowLeft'){ setDialMinutes(dialMinutes-1); e.preventDefault(); }
  });
  $$('#presets .preset').forEach(b=> b.onclick=()=>{ if(!data.activePomodoro) setDialMinutes(+b.dataset.min); });
}

function pomoRemainingMs(){
  const p = data.activePomodoro; if(!p) return 0;
  if(p.paused) return p.remaining;
  return p.endTarget - Date.now();
}
function renderPomo(){
  const p = data.activePomodoro;
  const ctr = $('#pomoControls');
  const presets = $('#presets');
  if(!p){
    presets.style.opacity = '1'; presets.style.pointerEvents='auto';
    $('#dialMin').classList.remove('counting');
    setDialMinutes(dialMinutes);
    ctr.innerHTML = `<button class="btn tomato big wide" id="btnPomoStart">▶  ${dialMinutes}분 시작</button>`;
    $('#btnPomoStart').onclick = startPomo;
  }else{
    presets.style.opacity = '.4'; presets.style.pointerEvents='none';
    const rem = Math.max(0, pomoRemainingMs());
    const totalMs = p.durationMs;
    $('#dialMin').textContent = fmtMS(rem);
    $('#dialMin').classList.add('counting');
    $('#dialUnit').textContent = p.paused ? '일시정지' : '남음';
    setDialVisual(0, rem/totalMs); // 남은 비율
    if(p.paused){
      ctr.innerHTML = `
        <button class="btn tomato grow" id="btnPomoResume">▶ 계속</button>
        <button class="btn danger grow" id="btnPomoStop">■ 중단</button>`;
      $('#btnPomoResume').onclick = resumePomo;
      $('#btnPomoStop').onclick = stopPomo;
    }else{
      ctr.innerHTML = `
        <button class="btn ghost grow" id="btnPomoPause">‖ 일시정지</button>
        <button class="btn danger grow" id="btnPomoStop">■ 중단</button>`;
      $('#btnPomoPause').onclick = pausePomo;
      $('#btnPomoStop').onclick = stopPomo;
    }
  }
}
function startPomo(){
  unlockAudio(); requestNotifyPermission();
  const now = Date.now();
  const durationMs = dialMinutes*60000;
  data.activePomodoro = { firstStart: now, durationMs, endTarget: now+durationMs, paused:false, remaining: durationMs };
  flush(); requestWakeLock(); renderPomo();
}
function pausePomo(){
  const p=data.activePomodoro; if(!p||p.paused) return;
  p.remaining = p.endTarget - Date.now(); p.paused=true;
  flush(); renderPomo();
}
function resumePomo(){
  const p=data.activePomodoro; if(!p||!p.paused) return;
  p.endTarget = Date.now()+p.remaining; p.paused=false;
  flush(); requestWakeLock(); renderPomo();
}
function stopPomo(){
  data.activePomodoro = null;
  flush(); releaseWakeLock();
  toast('뽀모도로를 중단했어요');
  renderPomo();
}
function completePomo(){
  const p = data.activePomodoro; if(!p) return;
  const end = p.firstStart + p.durationMs;
  data.sessions.push({
    id:'p'+p.firstStart, type:'pomodoro',
    date: dateKey(p.firstStart),
    start: p.firstStart, end, duration: p.durationMs
  });
  const mins = Math.round(p.durationMs/60000);
  data.activePomodoro = null;
  flush(); releaseWakeLock();
  renderPomo(); renderHero(); if(currentTab==='cal') renderCalendar();

  // 알림 · 효과음 · 진동 · 오버레이
  chime();
  if(navigator.vibrate) try{ navigator.vibrate([200,100,200]); }catch(e){}
  notify('뽀모도로 완료! 🍅', `${mins}분이 오늘 공부시간에 더해졌어요`);
  $('#doneSub').textContent = `${mins}분이 오늘 공부시간에 더해졌어요`;
  $('#doneBackdrop').classList.remove('hidden');
}

/* =================================================================
   달력
================================================================= */
let calYear, calMonth; // month: 0-11
function renderCalendar(){
  const now = new Date();
  if(calYear==null){ calYear=now.getFullYear(); calMonth=now.getMonth(); }
  $('#calTitle').textContent = `${calYear}년 ${calMonth+1}월`;

  const first = new Date(calYear, calMonth, 1);
  const startDow = first.getDay();
  const days = new Date(calYear, calMonth+1, 0).getDate();
  const grid = $('#calGrid'); grid.innerHTML='';

  // 이번 달 최대값(막대 높이용)
  let monthTotal=0, maxDur=1;
  for(let d=1; d<=days; d++){
    const t = savedTotalOn(dateKey(new Date(calYear,calMonth,d)));
    monthTotal+=t; if(t>maxDur) maxDur=t;
  }

  for(let i=0;i<startDow;i++){
    const c=document.createElement('div'); c.className='cal-cell empty'; grid.appendChild(c);
  }
  const todayK = dateKey(now);
  for(let d=1; d<=days; d++){
    const key = dateKey(new Date(calYear,calMonth,d));
    const t = savedTotalOn(key) + (data.activeStudy && dateKey(data.activeStudy.firstStart)===key ? liveStudyMs() : 0);
    const c=document.createElement('div');
    c.className='cal-cell'+(t>0?' has':'')+(key===todayK?' today':'');
    const h = t>0 ? Math.max(8,(t/maxDur)*100) : 0;
    c.innerHTML = `
      ${t>0?`<div class="barfill" style="height:${h}%"></div>`:''}
      <span class="d">${d}</span>
      ${t>0?`<span class="dur">${fmtKorDur(t)}</span>`:''}`;
    if(t>0) c.onclick = ()=>openDay(key);
    grid.appendChild(c);
  }
  $('#calMonthTotal').textContent = fmtKorDur(monthTotal);
}
function openDay(key){
  const list = sessionsOn(key).slice().sort((a,b)=>a.start-b.start);
  const total = list.reduce((a,s)=>a+s.duration,0);
  const [y,m,d] = key.split('-').map(Number);
  $('#dayTitle').textContent = `${m}월 ${d}일`;
  $('#dayTotal').textContent = fmtKorDur(total);
  const body = $('#dayBody');
  if(list.length===0){
    body.innerHTML = `<div class="sheet-empty">기록이 없어요</div>`;
  }else{
    body.innerHTML = list.map(s=>`
      <div class="sess">
        <div class="sess-l">
          <div class="sess-ic">${s.type==='pomodoro'?'🍅':'⏱'}</div>
          <div>
            <div class="sess-type">${s.type==='pomodoro'?'뽀모도로':'공부'}</div>
            <div class="sess-time">${clockOf(s.start)} – ${clockOf(s.end)}</div>
          </div>
        </div>
        <div class="sess-dur">${fmtKorDur(s.duration)}</div>
      </div>`).join('');
  }
  $('#dayBackdrop').classList.remove('hidden');
}

/* =================================================================
   목표 설정
================================================================= */
let goalDraft = 120;
function openGoal(){
  goalDraft = data.goalMinutes;
  drawGoalDraft();
  $('#goalBackdrop').classList.remove('hidden');
}
function drawGoalDraft(){
  $('#goalPickH').textContent = Math.floor(goalDraft/60);
  $('#goalPickM').textContent = pad(goalDraft%60);
}
function initGoal(){
  $('#goalRow').onclick = openGoal;
  $('#goalMinus').onclick = ()=>{ goalDraft=Math.max(10, goalDraft-10); drawGoalDraft(); };
  $('#goalPlus').onclick  = ()=>{ goalDraft=Math.min(1440, goalDraft+10); drawGoalDraft(); };
  $$('#goalQuick button').forEach(b=> b.onclick=()=>{ goalDraft=+b.dataset.min; drawGoalDraft(); });
  $('#goalSave').onclick = ()=>{
    data.goalMinutes = goalDraft; flush();
    $('#goalBackdrop').classList.add('hidden');
    renderHero(); toast('목표를 저장했어요');
  };
}

/* =================================================================
   사운드 · 알림 · 화면꺼짐방지
================================================================= */
let audioCtx=null;
function unlockAudio(){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
  }catch(e){}
}
function chime(){
  try{
    unlockAudio(); if(!audioCtx) return;
    const notes=[660,880,1046.5]; // E5, A5, C6
    notes.forEach((f,i)=>{
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type='sine'; o.frequency.value=f;
      const t=audioCtx.currentTime + i*0.18;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.35, t+0.03);
      g.gain.exponentialRampToValueAtTime(0.0001, t+0.5);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t); o.stop(t+0.55);
    });
  }catch(e){}
}
function requestNotifyPermission(){
  if('Notification' in window && Notification.permission==='default'){
    try{ Notification.requestPermission(); }catch(e){}
  }
}
function notify(title, body){
  try{
    if('Notification' in window && Notification.permission==='granted'){
      if(navigator.serviceWorker && navigator.serviceWorker.ready){
        navigator.serviceWorker.ready.then(reg=>{
          reg.showNotification(title,{body,icon:'icons/icon-192.png',badge:'icons/icon-192.png',vibrate:[200,100,200]});
        }).catch(()=> new Notification(title,{body}));
      }else{ new Notification(title,{body}); }
    }
  }catch(e){}
}
let wakeLock=null;
async function requestWakeLock(){
  try{ if('wakeLock' in navigator){ wakeLock = await navigator.wakeLock.request('screen'); } }catch(e){}
}
function releaseWakeLock(){ try{ if(wakeLock){ wakeLock.release(); wakeLock=null; } }catch(e){} }

/* ---------- 토스트 ---------- */
let toastTimer=null;
function toast(msg){
  const t=$('#toast'); t.textContent=msg; t.classList.remove('hidden');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.add('hidden'),1900);
}

/* =================================================================
   탭 전환 · 메인 루프
================================================================= */
let currentTab='study';
function switchTab(tab){
  currentTab=tab;
  $$('.tab').forEach(b=>b.classList.toggle('is-active', b.dataset.tab===tab));
  $('#panel-study').classList.toggle('hidden', tab!=='study');
  $('#panel-pomo').classList.toggle('hidden', tab!=='pomo');
  $('#panel-cal').classList.toggle('hidden', tab!=='cal');
  if(tab==='study') renderStudy();
  if(tab==='pomo')  renderPomo();
  if(tab==='cal')   renderCalendar();
}

function tick(){
  // 1초마다: 라이브 시계 갱신 + 뽀모도로 완료 감지
  if(data.activePomodoro && !data.activePomodoro.paused && pomoRemainingMs()<=0){
    completePomo();
  }
  renderHero();
  if(currentTab==='study') {
    const a=data.activeStudy;
    $('#studyElapsed').textContent = fmtHMS(liveStudyMs());
    $('#studyElapsed').classList.toggle('live', !!(a&&!a.paused));
  }
  if(currentTab==='pomo' && data.activePomodoro && !data.activePomodoro.paused){
    const p=data.activePomodoro, rem=Math.max(0,pomoRemainingMs());
    $('#dialMin').textContent = fmtMS(rem);
    setDialVisual(0, rem/p.durationMs);
  }
  // 라이브 중이면 주기적으로 저장(앱 강제종료 대비)
  if(data.activeStudy || data.activePomodoro) save();
}

/* 백그라운드 → 복귀 시 즉시 재계산 (정확도 보장) */
function onResume(){
  // 닫혀있는 동안 뽀모도로가 끝났는지 확인
  if(data.activePomodoro && !data.activePomodoro.paused && pomoRemainingMs()<=0){
    completePomo();
  }
  renderHero(); switchTab(currentTab);
}

/* =================================================================
   초기화
================================================================= */
function init(){
  load();
  initDial();
  initGoal();

  $$('.tab').forEach(b=> b.onclick=()=>switchTab(b.dataset.tab));
  $('#dayClose').onclick = ()=> $('#dayBackdrop').classList.add('hidden');
  $('#dayBackdrop').onclick = (e)=>{ if(e.target.id==='dayBackdrop') $('#dayBackdrop').classList.add('hidden'); };
  $('#goalBackdrop').onclick = (e)=>{ if(e.target.id==='goalBackdrop') $('#goalBackdrop').classList.add('hidden'); };
  $('#doneClose').onclick = ()=> $('#doneBackdrop').classList.add('hidden');
  $('#streakChip').onclick = ()=> switchTab('cal');
  $('#calPrev').onclick = ()=>{ calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); };
  $('#calNext').onclick = ()=>{ calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); };

  renderHero();
  switchTab('study');

  // 복귀 시 재계산 (앱을 닫았다 켜도 정확)
  document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) onResume(); });
  window.addEventListener('focus', onResume);
  window.addEventListener('pageshow', onResume);
  window.addEventListener('beforeunload', flush);
  // 라이브 세션 중 wake lock이 풀렸다면 복귀 시 재요청
  document.addEventListener('visibilitychange', ()=>{
    if(!document.hidden && (data.activeStudy||data.activePomodoro)) requestWakeLock();
  });

  setInterval(tick, 1000);

  // 서비스워커 등록 (오프라인)
  if('serviceWorker' in navigator){
    window.addEventListener('load', ()=>{
      navigator.serviceWorker.register('service-worker.js').catch(()=>{});
    });
  }
}

if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', init);
else init();

})();

</script>
</body>
</html>
